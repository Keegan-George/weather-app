<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>

<body>
    <div class="container">
        <div class="location"></div>

        <section class="weather-display">
            <div class="weather-icon">
            </div>

            <div class="temperature-display">
                <div class="current-temperature"><span class="value"></span><span class="unit"></span>
                </div>

                <div class="degree-buttons">
                    <button type="button" class="celcius_btn">&deg;C</button>
                    <button type="button" class="fahrenheit_btn">&deg;F</button>
                </div>
            </div>

            <div class="weather-details">
                <div class="description"></div>
                <div class="feels-like">Feels like: <span class="value"></span><span class="unit"></span></div>
                <div class="humidity">Humidity: <span class="value"></span><span class="unit">%</span></div>
                <div class="uv-index">UV Index: <span class="value"></span></div>
                <div class="visibility">Visibility: <span class="value"></span> <span class="unit"></span></div>
                <div class="wind-speed">Wind Speed: <span class="value"></span> <span class="unit"></span></div>
            </div>
        </section>

        <section class="search">
            <form>
                <input type="text" name="location-search" id="location-search" placeholder="search for location..">
                <button type="submit" class="search-button">Search</button>
            </form>
        </section>
    </div>

</body>

</html>
